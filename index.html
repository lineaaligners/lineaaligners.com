<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linea Aligners - Kosovo's Premium Clear Aligners</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
            background-color: #193D6D;
            color: #F5F7FA;
        }
        /* Account for fixed navbar height in anchor jumps */
        section {
            scroll-margin-top: 5rem;
        }
        .bg-aura {
            background: radial-gradient(circle at 50% -20%, #4169E1 0%, #193D6D 70%);
        }
        .bg-royal-gradient {
            background: linear-gradient(135deg, #4169E1 0%, #193D6D 100%);
        }
        .text-royal-gradient {
            background: linear-gradient(135deg, #87CEEB 0%, #4169E1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-card {
            background: rgba(25, 61, 109, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(65, 105, 225, 0.3);
        }
        .loader-dots div {
            animation: bounce 0.6s infinite alternate;
        }
        .loader-dots div:nth-child(2) { animation-delay: 0.2s; }
        .loader-dots div:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { to { transform: translateY(-4px); opacity: 0.5; } }
        
        /* Custom scrollbar for premium feel */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #193D6D;
        }
        ::-webkit-scrollbar-thumb {
            background: #4169E1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #87CEEB;
        }
        
        @keyframes scale-in {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .animate-scale-in {
            animation: scale-in 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/": "https://esm.sh/react@18.3.1/",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/": "https://esm.sh/react-dom@18.3.1/",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "@google/genai": "https://esm.sh/@google/genai@1.38.0",
    "three": "https://esm.sh/three@0.170.0",
    "three/": "https://esm.sh/three@0.170.0/",
    "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.17.10?external=three,react,react-dom",
    "@react-three/drei": "https://esm.sh/@react-three/drei@9.117.3?external=three,@react-three/fiber,react,react-dom"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-aura text-slate-900">
    <div id="root"></div>
    <!-- Entry point script module to fix the white screen issue -->
    <script type="module" src="/src/index.tsx"></script>
</body>
</html>
